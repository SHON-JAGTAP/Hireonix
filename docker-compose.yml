version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:latest
    container_name: hireonix-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - hireonix-network

  # Backend Server Service
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hireonix-server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGODB_URL=mongodb://admin:password123@mongodb:27017/hireonix?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key
      # Add other environment variables here like SENDER_EMAIL, SMTP details, etc.
    depends_on:
      - mongodb
    networks:
      - hireonix-network

  # Frontend Client Service
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hireonix-client
    ports:
      - "3000:80" # Nginx serves on 80 inside the container, mapping to 3000 on host
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
    networks:
      - hireonix-network

volumes:
  mongodb_data:

networks:
  hireonix-network:
    driver: bridge